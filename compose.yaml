services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-optimark}
      POSTGRES_USER: ${POSTGRES_USER:-optimark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-optimark}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-optimark} -d ${POSTGRES_DB:-optimark}
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:4.06
    environment:
      AWS_ACCESS_KEY_ID: ${SEAWEEDFS_ACCESS_KEY:-admin}
      AWS_SECRET_ACCESS_KEY: ${SEAWEEDFS_SECRET_KEY:-key}
    command: ["server", "-dir=/data", "-s3"]
    ports:
      - "127.0.0.1:${SEAWEEDFS_MASTER_PORT:-9333}:9333"
      - "127.0.0.1:${SEAWEEDFS_FILER_PORT:-8888}:8888"
      - "127.0.0.1:${SEAWEEDFS_S3_PORT:-8333}:8333"
    volumes:
      - seaweedfs-data:/data

volumes:
  postgres-data:
  redis-data:
  seaweedfs-data:
