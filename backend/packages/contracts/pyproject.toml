[project]
name = "clio"
version = "0.1.0"
description = "Shared contracts package for Optimark"
requires-python = ">=3.13"
dependencies = [
  "metis",
  "mnemosyne",
  "pydantic>=2.11,<3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/optimark_clio"]
