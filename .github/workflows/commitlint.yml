name: Commitlint

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install tooling
        run: bun install --frozen-lockfile

      - name: Lint pull request commits
        if: github.event_name == 'pull_request'
        run: bunx commitlint --config commitlint.config.cjs --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

      - name: Lint push commits
        if: github.event_name == 'push'
        run: bunx commitlint --config commitlint.config.cjs --from "${{ github.event.before }}" --to "${{ github.sha }}" --verbose
